bundle:
  name: quantlab-event-scanner

resources:
  jobs:
    phase1_manifest_trade_btc_probe:
      name: phase1_manifest_trade_btc_probe
      job_clusters:
        - job_cluster_key: phase1_probe_job_cluster
          new_cluster:
            spark_version: 15.4.x-photon-scala2.12
            node_type_id: m5d.large
            num_workers: 1
            runtime_engine: PHOTON
            aws_attributes:
              availability: SPOT_WITH_FALLBACK
              first_on_demand: 1
            custom_tags:
              project: quantlab-event-scanner
              phase: phase1a-probe
      tasks:
        - task_key: probe_latest_btc_trade
          job_cluster_key: phase1_probe_job_cluster
          spark_python_task:
            python_file: jobs/01_detect_events.py
            parameters:
              - --config
              - configs/dev.yaml
              - --sample-size
              - "20"

targets:
  dev:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/dev

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/prod
