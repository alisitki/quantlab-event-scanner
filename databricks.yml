bundle:
  name: quantlab-event-scanner

variables:
  cluster_id:
    description: Existing classic Databricks cluster ID for probe and fallback runs.
    default: 0426-145152-cv6y6ado

targets:
  dev_serverless:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/dev_serverless
    resources:
      jobs:
        phase1_manifest_trade_btc_probe_serverless:
          name: phase1_manifest_trade_btc_probe_serverless
          environments:
            - environment_key: phase1_probe_environment
              spec:
                environment_version: "2"
                dependencies:
                  - pyyaml>=6.0
          tasks:
            - task_key: probe_latest_btc_trade
              environment_key: phase1_probe_environment
              spark_python_task:
                python_file: jobs/01_detect_events.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --sample-size
                  - "20"

        phase1_btc_trade_move_candidates_serverless:
          name: phase1_btc_trade_move_candidates_serverless
          environments:
            - environment_key: phase1_move_candidate_environment
              spec:
                environment_version: "2"
                dependencies:
                  - pyyaml>=6.0
          tasks:
            - task_key: scan_btc_trade_move_candidates
              environment_key: phase1_move_candidate_environment
              spark_python_task:
                python_file: jobs/03_scan_trade_move_candidates.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --date
                  - "20260423"
                  - --threshold-pct
                  - "1.0"
                  - --lookahead-seconds
                  - "60"
                  - --sample-size
                  - "20"

  dev_classic:
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/dev_classic
    resources:
      jobs:
        phase1_manifest_trade_btc_probe_classic:
          name: phase1_manifest_trade_btc_probe_classic
          tasks:
            - task_key: probe_latest_btc_trade
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/01_detect_events.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --sample-size
                  - "20"

        phase1_btc_trade_profile:
          name: phase1_btc_trade_profile
          tasks:
            - task_key: profile_btc_trade_data
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/02_profile_trade_data.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --sample-size
                  - "20"

        phase1_btc_trade_move_candidates_classic:
          name: phase1_btc_trade_move_candidates_classic
          tasks:
            - task_key: scan_btc_trade_move_candidates
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/03_scan_trade_move_candidates.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --date
                  - "20260423"
                  - --threshold-pct
                  - "1.0"
                  - --lookahead-seconds
                  - "60"
                  - --sample-size
                  - "20"

        phase1_trial_event_map_classic:
          name: phase1_trial_event_map_classic
          tasks:
            - task_key: write_trial_event_map
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/04_write_trial_event_map.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --threshold-pct
                  - "1.0"
                  - --horizon-seconds
                  - "60"
                  - --aggregation-seconds
                  - "1"
                  - --detection-version
                  - trade_1s_60s_1pct_v1
                  - --sample-size
                  - "20"

        phase2a_pre_event_windows_trial_classic:
          name: phase2a_pre_event_windows_trial_classic
          tasks:
            - task_key: extract_pre_event_windows_trial
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/05_extract_pre_event_windows_trial.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --source-event-run-id
                  - phase1d_20260427T063442Z
                  - --event-id
                  - binance_btcusdt_20260423_down_001
                  - --lookback-seconds
                  - "300"
                  - --streams
                  - trade
                  - --sample-size
                  - "20"

        phase2b_pre_event_bbo_windows_trial_classic:
          name: phase2b_pre_event_bbo_windows_trial_classic
          tasks:
            - task_key: extract_pre_event_bbo_windows_trial
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/06_extract_pre_event_bbo_windows_trial.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --source-event-run-id
                  - phase1d_20260427T063442Z
                  - --event-id
                  - binance_btcusdt_20260423_down_001
                  - --lookback-seconds
                  - "300"
                  - --allow-partial-coverage
                  - "false"
                  - --sample-size
                  - "20"

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/prod
