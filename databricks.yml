bundle:
  name: quantlab-event-scanner

variables:
  cluster_id:
    description: Existing classic Databricks cluster ID for probe and fallback runs.

targets:
  dev_serverless:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/dev_serverless
    resources:
      jobs:
        phase1_manifest_trade_btc_probe_serverless:
          name: phase1_manifest_trade_btc_probe_serverless
          environments:
            - environment_key: phase1_probe_environment
              spec:
                environment_version: "2"
                dependencies:
                  - pyyaml>=6.0
          tasks:
            - task_key: probe_latest_btc_trade
              environment_key: phase1_probe_environment
              spark_python_task:
                python_file: jobs/01_detect_events.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --sample-size
                  - "20"

        phase1_btc_trade_move_candidates_serverless:
          name: phase1_btc_trade_move_candidates_serverless
          environments:
            - environment_key: phase1_move_candidate_environment
              spec:
                environment_version: "2"
                dependencies:
                  - pyyaml>=6.0
          tasks:
            - task_key: scan_btc_trade_move_candidates
              environment_key: phase1_move_candidate_environment
              spark_python_task:
                python_file: jobs/03_scan_trade_move_candidates.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --date
                  - "20260423"
                  - --threshold-pct
                  - "1.0"
                  - --lookahead-seconds
                  - "60"
                  - --sample-size
                  - "20"

  dev_classic:
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/dev_classic
    resources:
      jobs:
        phase1_manifest_trade_btc_probe_classic:
          name: phase1_manifest_trade_btc_probe_classic
          tasks:
            - task_key: probe_latest_btc_trade
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/01_detect_events.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --sample-size
                  - "20"

        phase1_btc_trade_profile:
          name: phase1_btc_trade_profile
          tasks:
            - task_key: profile_btc_trade_data
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/02_profile_trade_data.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --sample-size
                  - "20"

        phase1_btc_trade_move_candidates_classic:
          name: phase1_btc_trade_move_candidates_classic
          tasks:
            - task_key: scan_btc_trade_move_candidates
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/03_scan_trade_move_candidates.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --date
                  - "20260423"
                  - --threshold-pct
                  - "1.0"
                  - --lookahead-seconds
                  - "60"
                  - --sample-size
                  - "20"

        phase1_trial_event_map_classic:
          name: phase1_trial_event_map_classic
          tasks:
            - task_key: write_trial_event_map
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/04_write_trial_event_map.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --threshold-pct
                  - "1.0"
                  - --horizon-seconds
                  - "60"
                  - --aggregation-seconds
                  - "1"
                  - --detection-version
                  - trade_1s_60s_1pct_v1
                  - --sample-size
                  - "20"

        phase2a_pre_event_windows_trial_classic:
          name: phase2a_pre_event_windows_trial_classic
          tasks:
            - task_key: extract_pre_event_windows_trial
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/05_extract_pre_event_windows_trial.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --source-event-run-id
                  - phase1d_20260427T063442Z
                  - --event-id
                  - binance_btcusdt_20260423_down_001
                  - --lookback-seconds
                  - "300"
                  - --streams
                  - trade
                  - --sample-size
                  - "20"

        phase2b_pre_event_bbo_windows_trial_classic:
          name: phase2b_pre_event_bbo_windows_trial_classic
          tasks:
            - task_key: extract_pre_event_bbo_windows_trial
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/06_extract_pre_event_bbo_windows_trial.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --source-event-run-id
                  - phase1d_20260427T063442Z
                  - --event-id
                  - binance_btcusdt_20260423_down_001
                  - --lookback-seconds
                  - "300"
                  - --allow-partial-coverage
                  - "false"
                  - --sample-size
                  - "20"

        phase2c_pre_event_market_snapshots_trial_classic:
          name: phase2c_pre_event_market_snapshots_trial_classic
          tasks:
            - task_key: build_pre_event_market_snapshots_trial
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/07_build_pre_event_market_snapshots_trial.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --source-trade-run-id
                  - phase2a_20260427T071919Z
                  - --source-bbo-run-id
                  - phase2b_20260427T074205Z
                  - --event-id
                  - binance_btcusdt_20260423_down_001
                  - --lookback-seconds
                  - "300"
                  - --sample-size
                  - "20"

        phase2d_pre_event_profile_report_trial_classic:
          name: phase2d_pre_event_profile_report_trial_classic
          tasks:
            - task_key: profile_pre_event_market_snapshots_trial
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/08_profile_pre_event_market_snapshots_trial.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --source-snapshot-run-id
                  - phase2c_20260427T082248Z
                  - --event-id
                  - binance_btcusdt_20260423_down_001
                  - --lookback-seconds
                  - "300"
                  - --sample-size
                  - "20"

        phase2e_normal_time_trial_classic:
          name: phase2e_normal_time_trial_classic
          tasks:
            - task_key: build_normal_time_trial
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/09_build_normal_time_trial.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --date
                  - "20260423"
                  - --lookback-seconds
                  - "300"
                  - --threshold-pct
                  - "1.0"
                  - --horizon-seconds
                  - "60"
                  - --proximity-seconds
                  - "1800"
                  - --max-quality-attempts
                  - "20"
                  - --sample-size
                  - "20"

        phase2f_profile_comparison_trial_classic:
          name: phase2f_profile_comparison_trial_classic
          tasks:
            - task_key: compare_event_vs_normal_profiles_trial
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/10_compare_event_vs_normal_profiles_trial.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --event-profile-run-id
                  - phase2d_20260427T090707Z
                  - --normal-profile-run-id
                  - phase2e_20260427T093700Z
                  - --event-id
                  - binance_btcusdt_20260423_down_001
                  - --sample-size
                  - "20"

        phase2g_profile_comparison_top_diffs_trial_classic:
          name: phase2g_profile_comparison_top_diffs_trial_classic
          tasks:
            - task_key: inspect_profile_comparison_top_diffs_trial
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/11_inspect_profile_comparison_top_diffs_trial.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --source-comparison-run-id
                  - phase2f_20260427T113721Z
                  - --top-n
                  - "20"
                  - --sample-size
                  - "20"

        phase2j_multi_normal_trial_classic:
          name: phase2j_multi_normal_trial_classic
          tasks:
            - task_key: build_multi_normal_trial
              existing_cluster_id: ${var.cluster_id}
              spark_python_task:
                python_file: jobs/12_build_multi_normal_trial.py
                parameters:
                  - --config
                  - configs/dev.yaml
                  - --event-profile-run-id
                  - phase2d_20260427T090707Z
                  - --event-id
                  - binance_btcusdt_20260423_down_001
                  - --date
                  - "20260423"
                  - --lookback-seconds
                  - "300"
                  - --threshold-pct
                  - "1.0"
                  - --horizon-seconds
                  - "60"
                  - --proximity-seconds
                  - "1800"
                  - --anchor-step-seconds
                  - "60"
                  - --selected-normal-count
                  - "10"
                  - --min-anchor-spacing-seconds
                  - "1800"
                  - --top-n
                  - "20"
                  - --sample-size
                  - "20"

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/prod
