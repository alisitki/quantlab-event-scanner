bundle:
  name: quantlab-event-scanner

resources:
  jobs:
    phase1_manifest_trade_btc_probe_serverless:
      name: phase1_manifest_trade_btc_probe_serverless
      environments:
        - environment_key: phase1_probe_environment
          spec:
            environment_version: "2"
            dependencies:
              - pyyaml>=6.0
      tasks:
        - task_key: probe_latest_btc_trade
          environment_key: phase1_probe_environment
          spark_python_task:
            python_file: jobs/01_detect_events.py
            parameters:
              - --config
              - configs/dev.yaml
              - --sample-size
              - "20"

    phase1_manifest_trade_btc_probe_classic:
      name: phase1_manifest_trade_btc_probe_classic
      tasks:
        - task_key: probe_latest_btc_trade
          existing_cluster_id: ${var.cluster_id}
          spark_python_task:
            python_file: jobs/01_detect_events.py
            parameters:
              - --config
              - configs/dev.yaml
              - --sample-size
              - "20"

variables:
  cluster_id:
    description: Existing classic Databricks cluster ID for probe runs.
    default: 0426-145152-cv6y6ado

targets:
  dev_serverless:
    mode: development
    default: true
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/dev_serverless

  dev_classic:
    mode: development
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/dev_classic

  prod:
    mode: production
    workspace:
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/prod
